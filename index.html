<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GRAVITY SHIFT</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ════════════════════════════════════════════════════
//  GRAVITY SHIFT  —  YouTube Playables Submission
//  Built with HTML5 Canvas + Web Audio API
// ════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Logical resolution (all game coords use this) ──
const LW = 800, LH = 450;

function resize() {
  const sx = window.innerWidth  / LW;
  const sy = window.innerHeight / LH;
  const s  = Math.min(sx, sy);
  canvas.width  = LW;
  canvas.height = LH;
  canvas.style.width  = (LW * s) + 'px';
  canvas.style.height = (LH * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── Colours ────────────────────────────────────────
const C = {
  bg:        '#04040f',
  player:    '#00f5ff',
  playerMid: '#0088ff',
  pipe:      '#ff1a6e',
  pipeGlow:  '#ff006e',
  orb:       '#ffd700',
  orbGlow:   '#ff9900',
  white:     '#ffffff',
  gridLine:  'rgba(0,200,255,0.05)',
};

// ── YouTube Playables helpers ──────────────────────
let inYT = false;
let gamePaused = false;
let audioAllowed = true;

// ── Audio (Web Audio API – synthesised, no files) ──
let ac = null;

function initAudio() {
  if (!audioAllowed) return;
  if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
  if (ac.state === 'suspended') ac.resume();
}

function tone(freq, type, dur, vol, endFreq) {
  if (!ac || !audioAllowed) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (endFreq) o.frequency.exponentialRampToValueAtTime(endFreq, ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.start(); o.stop(ac.currentTime + dur);
}

const sfx = {
  flip:  () => { tone(250, 'sine',     0.12, 0.18, 520); },
  orb:   () => { [523,659,784].forEach((f,i) => setTimeout(() => tone(f,'sine',0.09,0.11), i*55)); },
  pass:  () => { tone(900, 'sine',     0.05, 0.07, 1300); },
  die:   () => { tone(380, 'sawtooth', 0.65, 0.22, 35); },
  start: () => { [261,329,392,523].forEach((f,i) => setTimeout(() => tone(f,'sine',0.14,0.12), i*75)); },
  milestone: () => { [523,659,784,1047].forEach((f,i) => setTimeout(() => tone(f,'sine',0.12,0.10), i*60)); },
};

// ── Constants ──────────────────────────────────────
const GRAV       = 0.28;
const FLAP_VEL   = -5.2;  // upward boost on tap (like Flappy Bird)
const PIPE_W     = 62;
const PIPE_GAP   = 155;   // classic Flappy Bird feel
const BORDER     = 30;   // floor/ceiling thickness
const P_RADIUS   = 15;
const TRAIL_LEN  = 18;
const GRACE_TIME = 90;   // invincibility frames at start

// ── State ──────────────────────────────────────────
let state    = 'start';  // 'start' | 'playing' | 'dead'
let score    = 0;
let hiScore  = 0;
let frame    = 0;
let pipeTimer    = 0;
let pipeInterval = 110;
let speed    = 2.5;
let newBest  = false;
let deathAt  = 0;
let graceLeft = 0;

// screen effects
let shake   = 0;
let flashA  = 0;
let flashCl = '#fff';

// ── Player ───────────────────────────────────────
const P = {
  x: 130, y: LH / 2,
  vy: 0,
  alive: true,
  rotation: 0,
  glow: 0,
  trail: [],
};

// ── Game objects ───────────────────────────────────
let pipes     = [];
let particles = [];

// ── Stars (3 parallax layers) ──────────────────────
const STARS = [];
(function initStars() {
  for (let i = 0; i < 130; i++) {
    STARS.push({
      x: Math.random() * LW,
      y: Math.random() * LH,
      r: 0.3 + Math.random() * 1.4,
      spd: 0.15 + Math.random() * 0.75,
      op: 0.25 + Math.random() * 0.75,
      tw: Math.random() * Math.PI * 2,
    });
  }
})();

// ── Nebula blobs (static, painted once) ────────────
const NEBULAE = [];
(function initNebulae() {
  const cols = ['rgba(0,80,180,', 'rgba(80,0,140,', 'rgba(0,140,120,'];
  for (let i = 0; i < 5; i++) {
    NEBULAE.push({
      x: Math.random() * LW, y: Math.random() * LH,
      rx: 80 + Math.random() * 140, ry: 50 + Math.random() * 80,
      col: cols[i % cols.length] + (0.04 + Math.random() * 0.06) + ')',
    });
  }
})();

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════

function spawnParticles(x, y, color, count, spd, life) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = (0.4 + Math.random()) * spd;
    particles.push({
      x, y,
      vx: Math.cos(a) * v, vy: Math.sin(a) * v,
      life, maxLife: life,
      color,
      sz: 1.2 + Math.random() * 2.8,
    });
  }
}

function spawnPipe() {
  const margin  = BORDER + PIPE_GAP / 2 + 18;
  const gapC    = margin + Math.random() * (LH - margin * 2);
  const hasOrb  = Math.random() < 0.58;
  pipes.push({
    x: LW + PIPE_W + 4,
    gapC,
    passed: false,
    hasOrb, orbGone: false,
  });
}

// ══════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════

function onInput() {
  initAudio();
  if (state === 'start')   { startGame(); return; }
  if (state === 'dead')    { if (Date.now() - deathAt > 800) restartGame(); return; }
  if (state === 'playing') { flap(); }
}

document.addEventListener('keydown', e => {
  if (['Space','ArrowUp','ArrowDown'].includes(e.code)) { e.preventDefault(); onInput(); }
});
canvas.addEventListener('pointerdown', e => { e.preventDefault(); onInput(); });

// ══════════════════════════════════════════════════════
//  GAME CONTROL
// ══════════════════════════════════════════════════════

function startGame() {
  sfx.start();
  resetAll();
  state = 'playing';
}

function restartGame() {
  resetAll();
  sfx.start();
  state = 'playing';
}

function resetAll() {
  score = 0; frame = 0; newBest = false;
  pipeTimer = 0; pipeInterval = 110; speed = 2.5;
  pipes = []; particles = [];
  shake = 0; flashA = 0;
  P.x = 130; P.y = LH / 2;
  P.vy = 0;
  P.alive = true; P.rotation = 0;
  P.glow = 0; P.trail = [];
  graceLeft = GRACE_TIME;
}

function flap() {
  P.vy   = FLAP_VEL;
  P.glow = 1;
  sfx.flip();
  spawnParticles(P.x, P.y, C.player, 6, 3, 18);
}

function die() {
  if (!P.alive || graceLeft > 0) return;
  P.alive = false;
  state   = 'dead';
  deathAt = Date.now();
  shake   = 22;
  flashA  = 0.65; flashCl = '#ff0040';
  sfx.die();
  spawnParticles(P.x, P.y, C.player, 28, 6, 65);
  spawnParticles(P.x, P.y, C.pipe,   18, 4, 50);
  if (score > hiScore) {
    hiScore = score;
    newBest = true;
  }
  // Report score & save to cloud
  if (inYT) {
    try { ytgame.engagement.sendScore({ value: score }); } catch(e) {}
    try { ytgame.game.saveData(JSON.stringify({ hi: hiScore })); } catch(e) {}
  } else {
    localStorage.setItem('gsHI', hiScore);
  }
}

// ══════════════════════════════════════════════════════
//  UPDATE
// ══════════════════════════════════════════════════════

function update() {

  // ── Stars (always) ──
  const starMult = state === 'playing' ? speed / 3.5 : 0.55;
  for (const s of STARS) {
    s.x -= s.spd * starMult * 0.28;
    if (s.x < 0) s.x = LW + s.r;
    s.tw += 0.045;
  }

  // ── Screen FX (always) ──
  shake  *= 0.82;
  flashA  = Math.max(0, flashA - 0.022);

  // ── Particles (also on dead screen for explosion) ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx; p.y += p.vy;
    p.vy += 0.07;  // particles inherit a hint of gravity
    p.vx *= 0.96;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (state !== 'playing') return;

  frame++;

  // ── Grace period countdown ──
  if (graceLeft > 0) graceLeft--;

  // ── Difficulty ramp (very gentle, Flappy Bird style) ──
  speed        = 2.5 + Math.min(frame / 2000, 1.8);
  pipeInterval = Math.max(85, 110 - Math.floor(frame / 900) * 3);

  // ── Player physics (gravity always down, like Flappy Bird) ──
  P.vy += GRAV;
  P.vy  = Math.max(-8, Math.min(8, P.vy));
  P.y  += P.vy;

  // Trail
  P.trail.unshift({ x: P.x, y: P.y });
  if (P.trail.length > TRAIL_LEN) P.trail.pop();

  // Rotation (tilts up when flapping, down when falling — like Flappy Bird)
  const targetRot = P.vy * 0.08;
  P.rotation += (targetRot - P.rotation) * 0.12;
  P.glow = Math.max(0, P.glow - 0.055);

  // Boundary
  if (P.y - P_RADIUS < BORDER || P.y + P_RADIUS > LH - BORDER) { die(); return; }

  // ── Pipe spawning ──
  pipeTimer++;
  if (pipeTimer >= pipeInterval) { pipeTimer = 0; spawnPipe(); }

  // ── Pipe logic ──
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= speed;

    // Pass score
    if (!p.passed && p.x + PIPE_W < P.x) {
      p.passed = true;
      score++;
      sfx.pass();
      if (score % 10 === 0) {
        sfx.milestone();
        flashA = 0.1; flashCl = '#00ff88';
      }
    }

    // Orb pickup
    if (p.hasOrb && !p.orbGone) {
      const ox = p.x + PIPE_W / 2;
      const oy = p.gapC;
      const dx = P.x - ox, dy = P.y - oy;
      if (Math.sqrt(dx*dx + dy*dy) < P_RADIUS + 11) {
        p.orbGone = true;
        score += 3;
        sfx.orb();
        spawnParticles(ox, oy, C.orb, 14, 4.5, 32);
        flashA = 0.08; flashCl = C.orb;
      }
    }

    // Collision
    const top = p.gapC - PIPE_GAP / 2;
    const bot = p.gapC + PIPE_GAP / 2;
    if (P.x + P_RADIUS > p.x && P.x - P_RADIUS < p.x + PIPE_W) {
      if (P.y - P_RADIUS < top || P.y + P_RADIUS > bot) { die(); return; }
    }

    if (p.x < -PIPE_W - 10) pipes.splice(i, 1);
  }
}

// ══════════════════════════════════════════════════════
//  DRAW HELPERS
// ══════════════════════════════════════════════════════

function glow(color, blur) {
  ctx.shadowColor = color;
  ctx.shadowBlur  = blur;
}
function noGlow() {
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur  = 0;
}

function drawBackground() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, LW, LH);

  // Nebulae
  for (const n of NEBULAE) {
    ctx.save();
    ctx.translate(n.x, n.y);
    ctx.scale(1, n.ry / n.rx);
    ctx.beginPath();
    ctx.arc(0, 0, n.rx, 0, Math.PI * 2);
    ctx.fillStyle = n.col;
    ctx.fill();
    ctx.restore();
  }

  // Grid
  ctx.strokeStyle = C.gridLine;
  ctx.lineWidth   = 1;
  const cols = 20, rows = 12;
  ctx.beginPath();
  for (let i = 0; i <= cols; i++) {
    const x = i * (LW / cols);
    ctx.moveTo(x, 0); ctx.lineTo(x, LH);
  }
  for (let i = 0; i <= rows; i++) {
    const y = i * (LH / rows);
    ctx.moveTo(0, y); ctx.lineTo(LW, y);
  }
  ctx.stroke();
}

function drawStars() {
  for (const s of STARS) {
    const op = s.op * (0.65 + 0.35 * Math.sin(s.tw));
    ctx.globalAlpha = op;
    ctx.fillStyle   = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawPipes() {
  for (const p of pipes) {
    const top = p.gapC - PIPE_GAP / 2;
    const bot = p.gapC + PIPE_GAP / 2;

    glow(C.pipeGlow, 20);

    // Top pipe body
    const gTop = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
    gTop.addColorStop(0,   '#6b0033');
    gTop.addColorStop(0.45, C.pipe);
    gTop.addColorStop(1,   '#6b0033');
    ctx.fillStyle = gTop;
    ctx.fillRect(p.x, BORDER, PIPE_W, top - BORDER);

    // Bottom pipe body
    ctx.fillStyle = gTop;
    ctx.fillRect(p.x, bot, PIPE_W, LH - BORDER - bot);

    // Bright neon lips at gap edge
    glow(C.pipeGlow, 30);
    ctx.fillStyle = '#ff4090';
    ctx.fillRect(p.x, top - 7, PIPE_W, 7);
    ctx.fillRect(p.x, bot,     PIPE_W, 7);

    // Shine strip
    noGlow();
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(p.x + 5, BORDER, 9, top - BORDER);
    ctx.fillRect(p.x + 5, bot,    9, LH - BORDER - bot);
  }
  noGlow();
}

function drawOrbs() {
  const t = Date.now() / 1000;
  for (const p of pipes) {
    if (!p.hasOrb || p.orbGone) continue;
    const x = p.x + PIPE_W / 2;
    const y = p.gapC;
    const pulse = 1 + 0.18 * Math.sin(t * 4.2);
    const r = 13 * pulse;

    glow(C.orbGlow, 22);

    const gr = ctx.createRadialGradient(x, y, 0, x, y, r);
    gr.addColorStop(0,   '#ffffff');
    gr.addColorStop(0.3,  C.orb);
    gr.addColorStop(1,   'rgba(255,153,0,0)');
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    // white core
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(x, y, 5 * pulse, 0, Math.PI * 2);
    ctx.fill();

    noGlow();
  }
}

function drawPlayer() {
  if (!P.alive && Date.now() - deathAt > 150) return;

  // Blink during grace period
  if (graceLeft > 0 && Math.floor(graceLeft / 4) % 2 === 0) return;

  // Trail
  for (let i = P.trail.length - 1; i >= 0; i--) {
    const t   = P.trail[i];
    const fac = 1 - i / P.trail.length;
    ctx.globalAlpha = fac * 0.45;
    ctx.fillStyle   = C.playerMid;
    ctx.beginPath();
    ctx.arc(t.x, t.y, P_RADIUS * fac * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.save();
  ctx.translate(P.x, P.y);
  ctx.rotate(P.rotation);

  glow(C.player, 22 + P.glow * 25);

  // Outer glow halo
  const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, P_RADIUS + 8);
  halo.addColorStop(0,   'rgba(0,245,255,0.35)');
  halo.addColorStop(1,   'rgba(0,245,255,0)');
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(0, 0, P_RADIUS + 8, 0, Math.PI * 2);
  ctx.fill();

  // Diamond body
  const gr = ctx.createRadialGradient(0, -3, 0, 0, 0, P_RADIUS);
  gr.addColorStop(0,   '#ffffff');
  gr.addColorStop(0.35, C.player);
  gr.addColorStop(1,   C.playerMid);
  ctx.fillStyle = gr;
  ctx.beginPath();
  ctx.moveTo(0, -P_RADIUS);
  ctx.lineTo(P_RADIUS * 0.68, 0);
  ctx.lineTo(0, P_RADIUS);
  ctx.lineTo(-P_RADIUS * 0.68, 0);
  ctx.closePath();
  ctx.fill();

  // Specular shine
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath();
  ctx.moveTo(0, -P_RADIUS * 0.55);
  ctx.lineTo(P_RADIUS * 0.28, -P_RADIUS * 0.1);
  ctx.lineTo(0, P_RADIUS * 0.1);
  ctx.lineTo(-P_RADIUS * 0.28, -P_RADIUS * 0.1);
  ctx.closePath();
  ctx.fill();

  noGlow();
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    const fac = p.life / p.maxLife;
    ctx.globalAlpha = fac;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.sz * fac, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBorders() {
  // Ceiling
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, LW, BORDER);
  // Floor
  ctx.fillRect(0, LH - BORDER, LW, BORDER);

  // Neon lines
  glow(C.player, 14);
  const lineGrad = ctx.createLinearGradient(0, 0, LW, 0);
  lineGrad.addColorStop(0,   'rgba(0,245,255,0.08)');
  lineGrad.addColorStop(0.5, 'rgba(0,245,255,0.55)');
  lineGrad.addColorStop(1,   'rgba(0,245,255,0.08)');
  ctx.fillStyle = lineGrad;
  ctx.fillRect(0, BORDER - 2,      LW, 2);
  ctx.fillRect(0, LH - BORDER,     LW, 2);
  noGlow();
}

function drawHUD() {
  if (state !== 'playing') return;

  ctx.save();
  ctx.textAlign = 'center';

  // Score
  glow(C.player, 14);
  ctx.fillStyle = C.white;
  ctx.font      = 'bold 38px Orbitron, monospace';
  ctx.fillText(score, LW / 2, 72);

  // Best
  noGlow();
  ctx.fillStyle = 'rgba(255,255,255,0.36)';
  ctx.font      = '12px Orbitron, monospace';
  ctx.fillText('BEST ' + hiScore, LW / 2, 92);



  noGlow();
  ctx.restore();
}

// ── Warp rings (decorative BG element on start/dead screens) ──
let ringAngle = 0;
function drawWarpRings() {
  ringAngle += 0.005;
  const cx = LW / 2, cy = LH / 2;
  for (let i = 0; i < 6; i++) {
    const t   = (i / 6 + ringAngle) % 1;
    const r   = 40 + t * 280;
    const op  = (1 - t) * 0.18;
    ctx.strokeStyle = `rgba(0,245,255,${op})`;
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r * 0.42, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// ── START SCREEN ───────────────────────────────────────
function drawStartScreen() {
  ctx.fillStyle = 'rgba(4,4,15,0.80)';
  ctx.fillRect(0, 0, LW, LH);

  drawWarpRings();

  ctx.save();
  ctx.textAlign = 'center';

  // Title line 1
  glow(C.player, 36);
  ctx.fillStyle = C.player;
  ctx.font      = 'bold 74px Orbitron, monospace';
  ctx.fillText('GRAVITY', LW / 2, 162);

  // Title line 2
  glow(C.pipe, 36);
  ctx.fillStyle = C.pipe;
  ctx.fillText('SHIFT', LW / 2, 240);

  // Tagline
  noGlow();
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font      = '13px Orbitron, monospace';
  ctx.fillText('TAP TO FLY  ·  DODGE PILLARS  ·  COLLECT ORBS', LW / 2, 276);

  // Blinking prompt
  if (Math.floor(Date.now() / 580) % 2 === 0) {
    glow(C.orb, 18);
    ctx.fillStyle = C.orb;
    ctx.font      = 'bold 19px Orbitron, monospace';
    ctx.fillText('[ TAP  OR  PRESS  SPACE ]', LW / 2, 342);
  }

  // Controls
  noGlow();
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.font      = '11px Orbitron, monospace';
  ctx.fillText('TAP TO FLAP  ·  DON\'T HIT THE PIPES', LW / 2, 390);

  ctx.restore();
}

// ── DEAD SCREEN ────────────────────────────────────────
function drawDeadScreen() {
  const elapsed = Date.now() - deathAt;
  const fadeIn  = Math.min(1, Math.max(0, (elapsed - 300) / 400));
  if (fadeIn <= 0) return;

  ctx.fillStyle = `rgba(4,4,15,${0.82 * fadeIn})`;
  ctx.fillRect(0, 0, LW, LH);

  if (fadeIn < 0.25) return;

  ctx.save();
  ctx.globalAlpha = fadeIn;
  ctx.textAlign   = 'center';

  // GAME OVER
  glow(C.pipe, 28);
  ctx.fillStyle = C.pipe;
  ctx.font      = 'bold 58px Orbitron, monospace';
  ctx.fillText('GAME OVER', LW / 2, 135);

  // Score number
  glow(C.white, 12);
  ctx.fillStyle = C.white;
  ctx.font      = 'bold 52px Orbitron, monospace';
  ctx.fillText(score, LW / 2, 210);

  noGlow();
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.font      = '12px Orbitron, monospace';
  ctx.fillText('SCORE', LW / 2, 232);

  // Best / New Best
  if (newBest) {
    glow(C.orb, 22);
    ctx.fillStyle = C.orb;
    ctx.font      = 'bold 22px Orbitron, monospace';
    ctx.fillText('✦  NEW BEST!  ✦', LW / 2, 272);
  } else {
    noGlow();
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.font      = '13px Orbitron, monospace';
    ctx.fillText('BEST: ' + hiScore, LW / 2, 272);
  }

  // Restart button (always visible after fade-in)
  if (elapsed > 800) {
    // Button background
    const bx = LW / 2 - 140, by = 305, bw = 280, bh = 52;
    const btnGrad = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
    btnGrad.addColorStop(0, 'rgba(0,245,255,0.18)');
    btnGrad.addColorStop(1, 'rgba(0,136,255,0.12)');
    ctx.fillStyle = btnGrad;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 12);
    ctx.fill();

    // Button border
    glow(C.player, 16);
    ctx.strokeStyle = C.player;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 12);
    ctx.stroke();

    // Button text (blinking)
    if (Math.floor(Date.now() / 600) % 2 === 0) {
      ctx.fillStyle = C.player;
    } else {
      ctx.fillStyle = '#ffffff';
    }
    ctx.font = 'bold 18px Orbitron, monospace';
    ctx.fillText('TAP TO PLAY AGAIN', LW / 2, 338);

    noGlow();

    // Hint
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.font = '11px Orbitron, monospace';
    ctx.fillText('or press SPACE', LW / 2, 378);
  }

  noGlow();
  ctx.restore();
}

// ══════════════════════════════════════════════════════
//  MAIN DRAW
// ══════════════════════════════════════════════════════

function draw() {
  const sx = shake > 0.5 ? (Math.random() - 0.5) * shake : 0;
  const sy = shake > 0.5 ? (Math.random() - 0.5) * shake : 0;

  ctx.save();
  ctx.translate(sx, sy);

  drawBackground();
  drawStars();
  drawPipes();
  drawOrbs();
  drawParticles();
  drawPlayer();
  drawBorders();
  drawHUD();

  // Screen flash overlay
  if (flashA > 0.001) {
    ctx.fillStyle   = flashCl;
    ctx.globalAlpha = flashA;
    ctx.fillRect(0, 0, LW, LH);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // UI screens draw outside shake transform
  if (state === 'start') drawStartScreen();
  if (state === 'dead')  drawDeadScreen();
}

// ══════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════

function loop() {
  if (!gamePaused) {
    update();
    draw();
  }
  requestAnimationFrame(loop);
}

// ── YouTube Playables SDK Bootstrap ───────────────
function initYTSDK() {
  try {
    inYT = typeof ytgame !== 'undefined' && !!ytgame.IN_PLAYABLES_ENV;
  } catch(e) { inYT = false; }

  if (!inYT) return Promise.resolve();

  // Audio control
  try {
    audioAllowed = ytgame.system.isAudioEnabled();
    ytgame.system.onAudioEnabledChange(function(enabled) {
      audioAllowed = enabled;
      if (!enabled && ac) { ac.close(); ac = null; }
    });
  } catch(e) {}

  // Pause / Resume
  try {
    ytgame.system.onPause(function() {
      gamePaused = true;
      if (ac && ac.state === 'running') ac.suspend();
    });
    ytgame.system.onResume(function() {
      gamePaused = false;
      if (ac && ac.state === 'suspended' && audioAllowed) ac.resume();
    });
  } catch(e) {}

  // Signal first frame ready
  try { ytgame.game.firstFrameReady(); } catch(e) {}

  // Load saved data
  return ytgame.game.loadData().then(function(raw) {
    if (raw) { try { hiScore = JSON.parse(raw).hi || 0; } catch(e) {} }
  }).catch(function() {});
}

function loadSDKScript() {
  // Only load the SDK inside a YouTube iframe (not for local file:// testing)
  var proto = window.location.protocol;
  if (proto === 'file:' || window.self === window.top) return Promise.resolve();
  return new Promise(function(resolve) {
    var s = document.createElement('script');
    s.src = 'https://www.youtube.com/game_api/v1';
    s.onload = resolve;
    s.onerror = resolve; // don't block the game if SDK fails
    var timeout = setTimeout(resolve, 3000); // timeout after 3s
    s.onload = function() { clearTimeout(timeout); resolve(); };
    document.head.appendChild(s);
  });
}

loadSDKScript()
  .then(initYTSDK)
  .then(function() {
    if (!inYT) hiScore = +localStorage.getItem('gsHI') || 0;
    loop();
    if (inYT) try { ytgame.game.gameReady(); } catch(e) {}
  });
</script>
</body>
